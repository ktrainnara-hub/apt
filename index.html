<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울시 부동산 실거래가 정보</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="seoul_data.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container text-center">
            <a class="navbar-brand mx-auto" href="#">
                <i class="fas fa-chart-line me-2"></i>서울시 부동산 시세 추이
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- Search Filters -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form id="searchForm" class="row g-3">
                    <div class="col-md-3">
                        <label for="cggNm" class="form-label">자치구</label>
                        <select id="cggNm" class="form-select">
                            <option value="">전체</option>
                            <option value="강남구">강남구</option>
                            <option value="강동구">강동구</option>
                            <option value="강북구">강북구</option>
                            <option value="강서구">강서구</option>
                            <option value="관악구">관악구</option>
                            <option value="광진구">광진구</option>
                            <option value="구로구">구로구</option>
                            <option value="금천구">금천구</option>
                            <option value="노원구">노원구</option>
                            <option value="도봉구">도봉구</option>
                            <option value="동대문구">동대문구</option>
                            <option value="동작구">동작구</option>
                            <option value="마포구">마포구</option>
                            <option value="서대문구">서대문구</option>
                            <option value="서초구">서초구</option>
                            <option value="성동구">성동구</option>
                            <option value="성북구">성북구</option>
                            <option value="송파구">송파구</option>
                            <option value="양천구">양천구</option>
                            <option value="영등포구">영등포구</option>
                            <option value="용산구">용산구</option>
                            <option value="은평구">은평구</option>
                            <option value="종로구">종로구</option>
                            <option value="중구">중구</option>
                            <option value="중랑구">중랑구</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="stdgNm" class="form-label">법정동</label>
                        <select id="stdgNm" class="form-select">
                            <option value="">자치구 선택</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="areaRange" class="form-label">전용면적(㎡)</label>
                        <select id="areaRange" class="form-select">
                            <option value="">전체</option>
                            <option value="small">60㎡ 이하</option>
                            <option value="medium">60㎡ ~ 85㎡</option>
                            <option value="large">85㎡ 초과</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="bldgNm" class="form-label">건물명</label>
                        <select id="bldgNm" class="form-select">
                            <option value="">법정동 선택</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="fas fa-search me-1"></i>조회
                        </button>
                        <button type="reset" id="resetBtn" class="btn btn-outline-secondary">
                            <i class="fas fa-undo"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Graph Section -->
        <div id="graphSection" class="card shadow-sm mb-4 d-none">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold"><i class="fas fa-chart-area me-2"></i>실거래가 시세 그래프</h5>
            </div>
            <div class="card-body">
                <div style="height: 400px; width: 100%;">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Result Info -->
        <div id="resultInfo" class="mb-3 d-none">
            <span class="badge bg-info text-dark" id="totalCount">총 0건</span>
        </div>

        <!-- Results Table -->
        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="resultTable">
                        <thead class="table-light">
                            <tr>
                                <th>계약일</th>
                                <th>자치구</th>
                                <th>법정동</th>
                                <th>건물명</th>
                                <th>금액(만원)</th>
                                <th>면적(㎡)</th>
                                <th>층</th>
                                <th>건축년도</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody">
                            <tr>
                                <td colspan="8" class="text-center py-5 text-muted">
                                    조회하기 버튼을 눌러 데이터를 불러오세요.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav id="paginationNav" class="d-none">
            <ul class="pagination justify-content-center" id="pagination">
                <!-- Pagination buttons will be inserted here -->
            </ul>
        </nav>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center my-5 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
